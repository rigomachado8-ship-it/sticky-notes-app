{% extends "base.html" %}

{% block title %}
    Sticky Notes | Delete Note
{% endblock %}

{% block content %}
<section class="form-wrapper">
    <div class="form-card danger-card">
        <h2>Delete Note</h2>
        <p>Are you sure you want to delete <strong>{{ note.title }}</strong>?</p>

        <form method="post">
            {% csrf_token %}
            <div class="form-actions">
                <button type="submit" class="btn btn-danger">Yes, Delete</button>
                <a href="{% url 'note_detail' note.pk %}" class="btn btn-secondary">Cancel</a>
            </div>
        </form>
    </div>
</section>
{% endblock %}
